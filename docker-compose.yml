services:

  api:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://claura:claura@db:5432/claura
      - REDIS_URL=redis://redis:6379
      - SECRET_KEY=change-this-in-production
      - VLLM_URL=${VLLM_URL:-http://localhost:8001/v1/completions}
      - VLLM_MODEL=${VLLM_MODEL:-legal-risk-classifier}
    volumes:
      - ./backend:/app
      - ./frontend:/frontend
      - /home/guru/legal-risk-finetune:/home/guru/legal-risk-finetune:ro
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    network_mode: host

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER:     claura
      POSTGRES_PASSWORD: claura
      POSTGRES_DB:       claura
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U claura"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
